; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nrf52840dk

; ── nRF52840-DK (onboard J-Link, upload via nrfjprog) ──────────────────────────
[env:nrf52840dk]
platform = nordicnrf52
board = nrf52840_dk_adafruit
framework = arduino
lib_extra_dirs = ../../
upload_protocol = jlink
extra_scripts = post:post_upload.py
lib_deps = adafruit/Adafruit nRFCrypto@^0.1.2
build_flags =
    -DBOARD_NRF52DK
    -I.pio/libdeps/nrf52840dk/Adafruit\ nRFCrypto/src
; Workaround: PlatformIO sucht SVD relativ zu .pio – expliziter Pfad verhindert den Fehler
debug_svd_path = /home/daniel/.platformio/platforms/nordicnrf52/misc/svd/nrf52840.svd
debug_tool = jlink
;build_type = debug
;debug_build_flags = -O0 -ggdb3
debug_server_parameters = -rtos GDBServer/RTOSPlugin_FreeRTOS
monitor_port = /dev/ttyACM0
monitor_speed = 115200

; ── Seeed XIAO nRF52840 (upload via nrfutil / 1200-bps touch) ─────────────────
[env:xiao_nrf52840]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
framework = arduino
lib_extra_dirs = ../../
monitor_speed = 115200
lib_deps = adafruit/Adafruit nRFCrypto@^0.1.2
build_flags =
    -DBOARD_XIAO_NRF52840
    -I.pio/libdeps/xiao_nrf52840/Adafruit\ nRFCrypto/src
